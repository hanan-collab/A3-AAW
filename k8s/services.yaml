apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: suilens-2206081824
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
      - name: catalog-service
        image: catalog-service:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DATABASE_URL
          value: postgres://catalog:catalog@catalog-db:5432/catalog
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: suilens-2206081824
spec:
  type: LoadBalancer
  selector:
    app: catalog-service
  ports:
  - port: 3001
    targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: suilens-2206081824
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: order-service:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DATABASE_URL
          value: postgres://orders:orders@order-db:5432/orders
        - name: CATALOG_SERVICE_URL
          value: http://catalog-service:3001
        - name: RABBITMQ_URL
          value: amqp://guest:guest@rabbitmq:5672
        ports:
        - containerPort: 3002
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: suilens-2206081824
spec:
  type: LoadBalancer
  selector:
    app: order-service
  ports:
  - port: 3002
    targetPort: 3002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: suilens-2206081824
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: notification-service:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DATABASE_URL
          value: postgres://notifications:notifications@notification-db:5432/notifications
        - name: RABBITMQ_URL
          value: amqp://guest:guest@rabbitmq:5672
        ports:
        - containerPort: 3003
        - containerPort: 3004
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: suilens-2206081824
spec:
  type: LoadBalancer
  selector:
    app: notification-service
  ports:
  - name: http
    port: 3003
    targetPort: 3003
  - name: ws
    port: 3004
    targetPort: 3004
