apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: suilens-2206081824
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: suilens-frontend:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: VITE_CATALOG_API
          value: http://localhost:3001
        - name: VITE_ORDER_API
          value: http://localhost:3002
        ports:
        - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: suilens-2206081824
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
  - port: 5173
    targetPort: 5173
